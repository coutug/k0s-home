apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: hermes
  namespace: flux-system
spec:
  interval: 20m
  sourceRef:
    kind: GitRepository
    name: k0s-home
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  path: components/hermes
  prune: true
  timeout: 10m
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: local-path-provisioner
spec:
  interval: 24h
  url: https://github.com/rancher/local-path-provisioner.git
  ref:
    tag: v0.0.35
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: local-path-provisioner
spec:
  interval: 1h
  timeout: 5m
  chart:
    spec:
      chart: ./deploy/chart/local-path-provisioner
      sourceRef:
        kind: GitRepository
        name: local-path-provisioner
      interval: 24h
  releaseName: local-path-provisioner
  driftDetection:
    mode: enabled
  valuesFrom:
    - kind: ConfigMap
      name: values-local-path-provisioner

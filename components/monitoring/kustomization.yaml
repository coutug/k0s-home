apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

resources:
- ns.yaml
- vmks.yaml

configMapGenerator:
  - name: values-vmks
    files:
      - values.yaml

secretGenerator:
  - name: grafana-admin
    envs:
      - grafana.env
    options:
      disableNameSuffixHash: true

configurations:
  - kustomizeconfig.yaml
